openapi: 3.1.0
info:
  title: Getswyft API
  version: 1.0.0
servers:
  - url: https://{host}
    variables:
      host:
        default: api.getswyft.local
paths:
  /v1/auth/me:
    get:
      summary: Get current authenticated user context
      responses:
        "200":
          description: Current user and tenant context
  /v1/tenants/current:
    get:
      summary: Get current tenant details and feature flags
      responses:
        "200":
          description: Tenant details
  /v1/tenants/{tenantId}:
    delete:
      summary: Permanently delete a tenant workspace (requires tenant.manage and another remaining tenant)
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant deleted
  /v1/tenants/current/settings:
    get:
      summary: Get tenant routing settings and fallback candidates
      responses:
        "200":
          description: Tenant routing settings
    patch:
      summary: Update tenant routing settings
      responses:
        "200":
          description: Updated routing settings
  /v1/tenants/current/webhooks:
    get:
      summary: List tenant webhook endpoints and recent delivery logs
      responses:
        "200":
          description: Webhook workspace
    post:
      summary: Create a tenant webhook endpoint
      responses:
        "201":
          description: Webhook endpoint created
  /v1/tenants/current/webhooks/{webhookId}:
    patch:
      summary: Update a tenant webhook endpoint
      parameters:
        - in: path
          name: webhookId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook endpoint updated
    delete:
      summary: Delete a tenant webhook endpoint
      parameters:
        - in: path
          name: webhookId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook endpoint deleted
  /v1/tenants/current/webhooks/{webhookId}/test:
    post:
      summary: Send a test webhook delivery to a tenant endpoint
      parameters:
        - in: path
          name: webhookId
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Test webhook dispatched
  /v1/tenants/current/billing:
    get:
      summary: Get tenant billing summary and invoices
      responses:
        "200":
          description: Billing workspace
  /v1/users/me/roles:
    get:
      summary: Get current user's roles and permissions in tenant
      responses:
        "200":
          description: Role and permission details
  /v1/users/team/assignable:
    get:
      summary: List assignable tenant teammates for conversation routing and transfer
      responses:
        "200":
          description: Assignable team members
  /v1/notifications:
    get:
      summary: List notifications for current user
      responses:
        "200":
          description: Notification list
  /v1/notifications/{id}/read:
    post:
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification marked as read
  /v1/notifications/devices:
    post:
      summary: Register the current browser or device for push notifications
      responses:
        "201":
          description: Notification device registered
    delete:
      summary: Disable a previously registered push notification device token
      responses:
        "200":
          description: Notification device disabled
  /v1/notifications/test:
    post:
      summary: Create and fan out a test push notification to the current user
      responses:
        "201":
          description: Test notification created
  /v1/storage/presign-upload:
    post:
      summary: Create upload URL for attachment storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                contentType:
                  type: string
      responses:
        "200":
          description: Presigned upload response
  /v1/storage/upload:
    put:
      summary: Upload a file directly (used with the local storage provider)
      responses:
        "201":
          description: File uploaded
  /v1/analytics/events:
    post:
      summary: Ingest analytics event
      responses:
        "202":
          description: Event accepted
  /v1/analytics/summary:
    get:
      summary: Get aggregated analytics summary for the current tenant
      responses:
        "200":
          description: Analytics summary
  /v1/conversations:
    get:
      summary: List tenant conversations with search and workflow filters
      responses:
        "200":
          description: Conversation list
  /v1/conversations/{id}:
    get:
      summary: Get a single tenant conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation detail
    patch:
      summary: Update conversation assignment, transfer, notes, or workflow status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated conversation detail
  /v1/conversations/{id}/messages:
    get:
      summary: List messages for a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation message list
    post:
      summary: Send a message to a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Message created
  /v1/conversations/{id}/call:
    post:
      summary: Start an outbound call for the conversation lead using the configured telephony provider
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Outbound call initiated
  /v1/conversations/{id}/read:
    post:
      summary: Mark all visible messages in a conversation as read for the current user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Read receipts updated
  /v1/messages/{id}/reactions:
    post:
      summary: Toggle a reaction on a message for the current user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reaction state updated
  /v1/users/team:
    get:
      summary: List tenant members and pending invitations
      responses:
        "200":
          description: Team workspace state
  /v1/users/team/invitations:
    post:
      summary: Invite a new team member via email
      responses:
        "201":
          description: Invitation created and email requested
  /v1/users/team/members/{userId}/role:
    patch:
      summary: Update a tenant team member role
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team member updated
  /v1/audit-logs:
    get:
      summary: List tenant audit logs
      responses:
        "200":
          description: Audit log list
